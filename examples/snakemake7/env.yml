# =============================================================================
# Mamba env for the Snakemake 7 example workflow.
#
# Create on an HPC cluster (assumes a mamba/miniforge module is available):
#
#   module load mamba/latest
#   mamba env create -f env.yml
#   source activate sn7-example
#
# Update an existing env after editing this file:
#
#   mamba env update -f env.yml --prune
# =============================================================================
name: sn7-example

channels:
  - conda-forge
  - bioconda

dependencies:
  # Pin to the last Snakemake 7 release. Snakemake 8 deprecated --cluster;
  # Snakemake 9 removed it. This env is intentionally on the legacy line.
  - python=3.11
  - snakemake=7.32.4

  # --use-singularity requires the apptainer/singularity CLI on PATH. Most
  # HPC sites provide this as a system module; include it here only if the
  # cluster doesn't.
  # - apptainer

  # Used only by scripts/fetch_example_data.sh to prepare the demo dataset
  # on the login node. The workflow itself reaches these same tools through
  # container/tools.sif at compute-node runtime.
  - bwa=0.7.18
  - samtools=1.21
  - gatk4=4.6.2.0
  - wgsim

  # Workflow lint / shell lint — handy on the login node.
  - shellcheck

  # pip is along for the ride in case you need to add anything not on conda.
  - pip
