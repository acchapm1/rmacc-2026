# =============================================================================
# Mamba env for the Snakemake 9 example workflow.
#
# Create on an HPC cluster (assumes a mamba/miniforge module is available):
#
#   module load mamba/latest
#   mamba env create -f env.yml
#   source activate sn9-example
#
# Update an existing env after editing this file:
#
#   mamba env update -f env.yml --prune
#
# `run.sh` / `sbatch.sh` both `source activate sn9-example` before invoking
# snakemake, so `$CONDA_PREFIX` is set and `get_python_executable()` in the
# Snakefile resolves to this env's interpreter on the compute nodes.
# =============================================================================
name: sn9-example

channels:
  - conda-forge
  - bioconda

dependencies:
  - python=3.12
  - snakemake=9.5.1

  # The executor plugin that replaced --cluster. Without this, --executor
  # slurm fails with a plugin-not-found error.
  - snakemake-executor-plugin-slurm

  # --use-singularity requires the apptainer/singularity CLI on PATH. Most
  # HPC sites provide this as a system module; uncomment if the cluster
  # doesn't.
  # - apptainer

  # Used only by scripts/fetch_example_data.sh to prepare the demo dataset
  # on the login node. The workflow itself reaches these same tools through
  # container/tools.sif at compute-node runtime.
  - bwa=0.7.18
  - samtools=1.21
  - gatk4=4.6.2.0
  - wgsim

  # Lint tooling — useful on the login node before submitting.
  - ruff
  - shellcheck

  - pip
